name: release
on:
  push:
    branches: [fix/release-pipeline]

permissions:
  contents: write

jobs:
  liberar: 
    runs-on: ubuntu-latest
    
    steps: 
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.13'
          
      - name: Instalar Dependências
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Executar Testes
        run: pytest 
        
      - name: Criar Pacote Limpo (ZIP)
        # O '*' ignora arquivos ocultos (.git, .github) por padrão no Linux.
        # O -x remove especificamente o que você não quer na entrega final.
        run: zip -r calculadora.zip * -x "tests/*" "README.md" ".gitignore" "venv/*" "*/__pycache__/*" "*.pyc"

      - name: Criar Release no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v1.0.0 --yes || true
          
          # Cria a nova release com o ZIP limpo
          gh release create v1.0.0 calculadora.zip --title "Release v1.0.0" --notes "Versão oficial de produção sem arquivos de teste."