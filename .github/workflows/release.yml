name: release
on:
  push:
    branches: [fix/release-pipeline]

permissions:
  contents: write

jobs:
  liberar: 
    runs-on: ubuntu-latest
    
    steps: 
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.13'
          
      - name: Instalar Dependências
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Executar Testes
        run: pytest 
        
      - name: Criar Pacote Limpo (ZIP)
        # O segredo aqui é o '-x' repetido e as aspas. 
        # Adicionei o README e o .gitignore conforme você pediu.
        run: |
          zip -r calculadora.zip . \
          -x "tests/*" \
          -x ".git/*" \
          -x ".github/*" \
          -x "README.md" \
          -x ".gitignore" \
          -x "venv/*" \
          -x "*/__pycache__/*" \
          -x "*.pyc"

      - name: Criar Release no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Tenta apagar a release v1.0.0 se ela já existir. 
          # O "|| true" serve para o código não dar erro caso a release ainda não exista.
          gh release delete v1.0.0 --yes || true
          
          # 2. Cria a release do zero com o seu arquivo ZIP limpo.
          gh release create v1.0.0 calculadora.zip --title "Release v1.0.0" --notes "Versão oficial de produção sem arquivos de teste."