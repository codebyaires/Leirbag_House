name: release
on:
  push:
    branches: [fix/release-pipeline]

permissions:
  contents: write

jobs:
  liberar: 
    runs-on: ubuntu-latest
    
    steps: 
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.13'
          
      - name: Instalar Dependências
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Executar Testes
        run: pytest 
        
      - name: Criar Pacote Limpo (ZIP)
        run: |
          # 1. Cria uma pasta temporária chamada 'dist' (distribuição)
          mkdir dist
          
          # 2. Copia todos os arquivos visíveis para lá
          # O '*' já ignora automaticamente pastas ocultas como .git e .github
          cp -r * dist/
          
          # 3. Deleta manualmente o que o professor não quer na entrega
          rm -rf dist/tests
          rm -rf dist/README.md
          rm -rf dist/.gitignore
          
          # 4. Entra na pasta e gera o zip do que sobrou
          cd dist && zip -r ../calculadora.zip .

      - name: Criar Release no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v1.0.0 --yes || true
          
          # Cria a nova release com o ZIP limpo
          gh release create v1.0.0 calculadora.zip --title "Release v1.0.0" --notes "Versão oficial de produção sem arquivos de teste."