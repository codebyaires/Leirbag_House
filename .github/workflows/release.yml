name: release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  liberar: 
    runs-on: ubuntu-latest
    
    steps: 
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.13'
          
      - name: Instalar Dependências
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Executar Testes
        run: pytest 
        
      - name: Criar Pacote Limpo (ZIP)
        # O segredo aqui é o '-x' repetido e as aspas. 
        # Adicionei o README e o .gitignore conforme você pediu.
        run: |
          zip -r calculadora.zip . \
          -x "tests/*" \
          -x ".git/*" \
          -x ".github/*" \
          -x "README.md" \
          -x ".gitignore" \
          -x "venv/*" \
          -x "*/__pycache__/*" \
          -x "*.pyc"

      - name: Criar Release no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verificamos se a release já existe para não dar erro no script.
          # Se já existir uma v1.0.0, ele vai apenas atualizar o arquivo.
          gh release create v1.0.0 calculadora.zip \
          --title "Release v1.0.0" \
          --notes "Versão oficial de produção sem arquivos de teste ou documentação de dev." \
          --clobber